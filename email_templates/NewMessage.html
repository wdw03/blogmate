<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .container { max-width: 550px; margin: 30px auto; background: #ffffff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .header { background: #3b82f6; padding: 20px 30px; color: white; }
        .content { padding: 30px; }
        .message-preview { background: #f1f5f9; padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 4px solid #3b82f6; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; }
        .avatar { width: 40px; height: 40px; background: #dbeafe; color: #1e40af; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin: 0; font-size: 18px;">New Message from Support</h2>
        </div>
        <div class="content">
            <div style="display: flex; align-items: center; margin-bottom: 15px;">
                <div class="avatar">BM</div>
                <strong>BlogMet Support</strong>
            </div>
            <p>You have received a new message regarding your recent inquiry or order.</p>
            
            <div class="message-preview">
                <p style="margin: 0; color: #334155;">"{{message_snippet}}..."</p>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="{{chat_url}}" style="background: #3b82f6; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: 600;">Reply in Chat Hub</a>
            </div>
        </div>
        <div class="footer">
            You are receiving this because you have active notifications enabled.
        </div>
    </div>
</body>
</html>
