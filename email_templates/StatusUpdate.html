<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 12px; overflow: hidden; }
        .status-bar { height: 6px; background: #3b82f6; width: 100%; }
        .content { padding: 40px; }
        .status-badge { display: inline-block; padding: 6px 16px; background: #eff6ff; color: #1d4ed8; border-radius: 20px; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
        .update-box { border-left: 4px solid #3b82f6; padding: 15px 20px; background: #f8fafc; margin: 20px 0; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar"></div>
        <div class="content">
            <div class="status-badge">{{new_status}}</div>
            <h2 style="margin: 0;">Order Update: #{{order_id}}</h2>
            <p style="color: #475569;">The status of your order for <strong>{{item_name}}</strong> has been updated.</p>
            
            <div class="update-box">
                <p style="margin: 0; font-style: italic; color: #1e293b;">"{{admin_note}}"</p>
            </div>

            <p>You can track the full progress and view live reports in your dashboard.</p>
            
            <a href="{{order_url}}" style="display: inline-block; margin-top: 10px; color: #3b82f6; font-weight: 600; text-decoration: none;">View Full Report &rarr;</a>
        </div>
        <div class="footer">
            Sent via DomIntel Automated Tracking System
        </div>
    </div>
</body>
</html>
